# CI — ACT Website (Next.js 15 · App Router · Standalone)
#
# Ce workflow remplace le template "Deploy to Pages" par défaut.
# Le projet utilise output:"standalone" + des API routes Shopify/Resend
# → il ne peut PAS être déployé sur GitHub Pages (site statique uniquement).
#
# Ce workflow fait à la place :
#   1. unit-tests  — vitest (données statiques, TypeScript, ~5 s)
#   2. build       — next build pour détecter les erreurs TS au plus tôt
#   3. e2e         — Playwright smoke pack (5 tests, tous mocks réseau)
#
# Déploiement recommandé : Vercel / Railway / Render (voir leurs GitHub Apps)

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# Annule les runs précédents sur la même branche pour économiser les minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Variables partagées ──────────────────────────────────────────────────────
# Les tests Playwright mockent tous les appels réseau (page.route).
# Ces valeurs sont des placeholders : le serveur Next.js démarre correctement
# mais Shopify/Resend ne sont jamais appelés pendant les tests.
env:
  SHOPIFY_STORE_DOMAIN: test.myshopify.com
  SHOPIFY_STOREFRONT_ACCESS_TOKEN: test_storefront_token
  SHOPIFY_ADMIN_ACCESS_TOKEN: shpat_test_admin_token
  RESEND_API_KEY: re_test_key
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ── 1. Tests unitaires ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── 2. Build TypeScript ────────────────────────────────────────────────────
  build:
    name: Build (next build)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build
        run: npm run build

  # ── 3. E2E Playwright ─────────────────────────────────────────────────────
  e2e:
    name: E2E smoke tests (Playwright)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        run: npm run test:e2e
        # CI=true désactive reuseExistingServer dans playwright.config.ts
        # et active les retries (x2) configurés dans le config

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        # Toujours uploader le rapport, même si les tests échouent
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
