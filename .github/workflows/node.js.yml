# Ce workflow est conservé pour référence mais désactivé.
# Le CI principal est dans nextjs.yml (unit-tests → build → e2e).
#
# Pour le réactiver : décommenter le bloc "on:" ci-dessous.

name: Node.js CI (disabled)

on:
  workflow_dispatch: # manuel uniquement

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          SHOPIFY_STORE_DOMAIN: test.myshopify.com
          SHOPIFY_STOREFRONT_ACCESS_TOKEN: test_token
          SHOPIFY_ADMIN_ACCESS_TOKEN: shpat_test
          RESEND_API_KEY: re_test
